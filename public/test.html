<script>
  async function logCost() {
    const response = await fetch('http://localhost:3000/api/log-cost', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        taskName: 'Test Task',
        model: 'Test Model',
        tokensIn: 100,
        tokensOut: 50,
        cost: 0.5
      })
    });

    const data = await response.json();
    console.log(data);
  }

  logCost();
</script>
